let swReady = false;

async function initStealthWorker() {
    try {
        const registration = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
        if (registration.installing) {
            const worker = registration.installing;
            worker.addEventListener('statechange', () => {
                if (worker.state === 'activated') pingWorkerUntilReady();
            });
        } else if (registration.active) {
            pingWorkerUntilReady();
        }
    } catch (error) {
        console.error("Worker Error:", error);
    }
}

async function pingWorkerUntilReady() {
    try {
        const res = await fetch('/drive_secure_download_ping');
        if (res.ok) swReady = true;
    } catch(e) {
        setTimeout(pingWorkerUntilReady, 500);
    }
}

initStealthWorker();
